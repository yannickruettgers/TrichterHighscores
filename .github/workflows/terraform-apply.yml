name: Terraform apply

on:
  push:
    branches:
      - main
    paths:
      - infra/terraform/**
      - .github/workflows/terraform-*.yml

permissions:
  id-token: write
  contents: read

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: eu-central-1
      TF_IN_AUTOMATION: true
      EXPECTED_TF_BACKEND_BUCKET: trichter-me-terraform-state-888577064621
      EXPECTED_TF_BACKEND_KEY: prod/terraform.tfstate
      EXPECTED_FRONTEND_BUCKET_NAME: trichter-me-prod-frontend
      TF_VAR_aws_region: eu-central-1
      TF_VAR_domain_name: trichter.me
      TF_VAR_hosted_zone_id: ${{ secrets.TF_VAR_HOSTED_ZONE_ID }}
      TF_VAR_github_oidc_repo: yannickruettgers/TrichterHighscores

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build backend bundles
        run: npm run build:backend

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_version: 1.15.8

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6.2.2
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Guard expected backend configuration
        run: |
          if [[ "${{ secrets.TF_BACKEND_BUCKET }}" != "$EXPECTED_TF_BACKEND_BUCKET" ]]; then
            echo "TF_BACKEND_BUCKET must be set to $EXPECTED_TF_BACKEND_BUCKET"
            exit 1
          fi

          if [[ "${{ secrets.TF_BACKEND_KEY }}" != "$EXPECTED_TF_BACKEND_KEY" ]]; then
            echo "TF_BACKEND_KEY must be set to $EXPECTED_TF_BACKEND_KEY"
            exit 1
          fi

      - name: Terraform init
        working-directory: infra/terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_BACKEND_BUCKET }}" \
            -backend-config="key=${{ secrets.TF_BACKEND_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="use_lockfile=true" \
            -backend-config="encrypt=true"

      - name: Guard expected remote state
        working-directory: infra/terraform
        run: |
          if ! terraform state pull > state.json; then
            echo "Expected production Terraform state was not found in the configured backend."
            echo "Check TF_BACKEND_BUCKET, TF_BACKEND_KEY and AWS_DEPLOY_ROLE_ARN."
            exit 1
          fi

          if ! grep -q '"frontend_bucket_name"' state.json || ! grep -q '"trichter-me-prod-frontend"' state.json; then
            echo "Configured backend does not contain the expected production application state."
            echo "Expected frontend bucket output value: $EXPECTED_FRONTEND_BUCKET_NAME"
            exit 1
          fi

      - name: Terraform fmt check
        working-directory: infra/terraform
        run: terraform fmt -check -recursive

      - name: Terraform validate
        working-directory: infra/terraform
        run: terraform validate

      - name: Terraform plan
        working-directory: infra/terraform
        run: terraform plan -input=false -out=tfplan

      - name: Upload Terraform plan
        uses: actions/upload-artifact@v4.6.2
        with:
          name: terraform-apply-plan
          path: infra/terraform/tfplan
          if-no-files-found: error

      - name: Upload Terraform build artifacts
        uses: actions/upload-artifact@v4.6.2
        with:
          name: terraform-apply-build-artifacts
          path: infra/terraform/.build
          include-hidden-files: true
          if-no-files-found: error

  terraform-apply:
    needs: terraform-plan
    runs-on: ubuntu-latest
    environment:
      name: production
    env:
      AWS_REGION: eu-central-1
      TF_IN_AUTOMATION: true
      EXPECTED_TF_BACKEND_BUCKET: trichter-me-terraform-state-888577064621
      EXPECTED_TF_BACKEND_KEY: prod/terraform.tfstate
      EXPECTED_FRONTEND_BUCKET_NAME: trichter-me-prod-frontend
      TF_VAR_aws_region: eu-central-1
      TF_VAR_domain_name: trichter.me
      TF_VAR_hosted_zone_id: ${{ secrets.TF_VAR_HOSTED_ZONE_ID }}
      TF_VAR_github_oidc_repo: yannickruettgers/TrichterHighscores

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build backend bundles
        run: npm run build:backend

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_version: 1.15.8

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6.2.2
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Guard expected backend configuration
        run: |
          if [[ "${{ secrets.TF_BACKEND_BUCKET }}" != "$EXPECTED_TF_BACKEND_BUCKET" ]]; then
            echo "TF_BACKEND_BUCKET must be set to $EXPECTED_TF_BACKEND_BUCKET"
            exit 1
          fi

          if [[ "${{ secrets.TF_BACKEND_KEY }}" != "$EXPECTED_TF_BACKEND_KEY" ]]; then
            echo "TF_BACKEND_KEY must be set to $EXPECTED_TF_BACKEND_KEY"
            exit 1
          fi

      - name: Terraform init
        working-directory: infra/terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_BACKEND_BUCKET }}" \
            -backend-config="key=${{ secrets.TF_BACKEND_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="use_lockfile=true" \
            -backend-config="encrypt=true"

      - name: Guard expected remote state
        working-directory: infra/terraform
        run: |
          if ! terraform state pull > state.json; then
            echo "Expected production Terraform state was not found in the configured backend."
            echo "Check TF_BACKEND_BUCKET, TF_BACKEND_KEY and AWS_DEPLOY_ROLE_ARN."
            exit 1
          fi

          if ! grep -q '"frontend_bucket_name"' state.json || ! grep -q '"trichter-me-prod-frontend"' state.json; then
            echo "Configured backend does not contain the expected production application state."
            echo "Expected frontend bucket output value: $EXPECTED_FRONTEND_BUCKET_NAME"
            exit 1
          fi

      - name: Download Terraform plan
        uses: actions/download-artifact@v4.3.0
        with:
          name: terraform-apply-plan
          path: infra/terraform

      - name: Download Terraform build artifacts
        uses: actions/download-artifact@v4.3.0
        with:
          name: terraform-apply-build-artifacts
          path: infra/terraform/.build

      - name: Terraform apply
        working-directory: infra/terraform
        run: terraform apply -auto-approve -input=false tfplan
